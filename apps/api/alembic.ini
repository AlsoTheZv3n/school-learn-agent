# Alembic config (sync). The DB URL is injected from its.config.settings in env.py,
# so it is NOT hardcoded here. Run from apps/api with DATABASE_URL set, e.g.:
#   uv run alembic upgrade head
[alembic]
script_location = alembic
prepend_sys_path = src
path_separator = os
# template for new revision filenames
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
