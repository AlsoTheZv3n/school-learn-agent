# Explicit project name so this stack never collides with another project's
# default "infra" name (the folder is called infra/). See: cancer-research-prototype-v2.
name: school-learn-agent

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: its
      POSTGRES_PASSWORD: its_dev_pw
      POSTGRES_DB: its
    ports:
      - "5432:5432"
    volumes:
      - its_pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U its -d its"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  its_pgdata:
